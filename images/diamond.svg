<svg xmlns="http://www.w3.org/2000/svg" width="80" height="80">
  <rect width="80" height="80" fill="#0e0e0e"/>
  
  <!-- Row 1: two diamonds offset -->
  <ellipse cx="20" cy="20" rx="10" ry="4" transform="rotate(-40 20 20)" fill="#161616" stroke="#1a1a1a" stroke-width="0.5"/>
  <ellipse cx="60" cy="20" rx="10" ry="4" transform="rotate(-40 60 20)" fill="#161616" stroke="#1a1a1a" stroke-width="0.5"/>

  <!-- Row 2: offset by half -->
  <ellipse cx="40" cy="40" rx="10" ry="4" transform="rotate(-40 40 40)" fill="#161616" stroke="#1a1a1a" stroke-width="0.5"/>
  <ellipse cx="0" cy="40" rx="10" ry="4" transform="rotate(-40 0 40)" fill="#161616" stroke="#1a1a1a" stroke-width="0.5"/>
  <ellipse cx="80" cy="40" rx="10" ry="4" transform="rotate(-40 80 40)" fill="#161616" stroke="#1a1a1a" stroke-width="0.5"/>

  <!-- Row 3: same as row 1 -->
  <ellipse cx="20" cy="60" rx="10" ry="4" transform="rotate(-40 20 60)" fill="#161616" stroke="#1a1a1a" stroke-width="0.5"/>
  <ellipse cx="60" cy="60" rx="10" ry="4" transform="rotate(-40 60 60)" fill="#161616" stroke="#1a1a1a" stroke-width="0.5"/>

  <!-- subtle highlight on each bump top edge -->
  <ellipse cx="20" cy="19" rx="8" ry="2" transform="rotate(-40 20 19)" fill="none" stroke="#222" stroke-width="0.4"/>
  <ellipse cx="60" cy="19" rx="8" ry="2" transform="rotate(-40 60 19)" fill="none" stroke="#222" stroke-width="0.4"/>
  <ellipse cx="40" cy="39" rx="8" ry="2" transform="rotate(-40 40 39)" fill="none" stroke="#222" stroke-width="0.4"/>
  <ellipse cx="20" cy="59" rx="8" ry="2" transform="rotate(-40 20 59)" fill="none" stroke="#222" stroke-width="0.4"/>
  <ellipse cx="60" cy="59" rx="8" ry="2" transform="rotate(-40 60 59)" fill="none" stroke="#222" stroke-width="0.4"/>
</svg>